<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3>🎫 Book Ticket</h3>

<form onsubmit="bookTicket(); return false;">

<input type="text" id="name" class="form-control mb-2" placeholder="Passenger Name" required>

<select id="source" class="form-control mb-2">
<option>Hyderabad</option>
<option>Chennai</option>
<option>Bangalore</option>
</select>

<select id="destination" class="form-control mb-2">
<option>Delhi</option>
<option>Mumbai</option>
<option>Kolkata</option>
</select>

<input type="date" id="date" class="form-control mb-2" required>

<input type="number" id="tickets" class="form-control mb-2" placeholder="No of Tickets" required>

<select id="class" class="form-control mb-2">
<option>Economy</option>
<option>Business</option>
</select>

<button class="btn btn-warning w-100">Book Ticket</button>

</form>

<script>
function bookTicket() {

let name = document.getElementById("name").value;
let source = document.getElementById("source").value;
let dest = document.getElementById("destination").value;
let date = document.getElementById("date").value;
let tickets = document.getElementById("tickets").value;
let cls = document.getElementById("class").value;

let pricePerTicket = (cls === "Business") ? 1000 : 500;
let total = tickets * pricePerTicket;

let ticket = {
name, source, dest, date, tickets, cls, total
};

let allTickets = JSON.parse(localStorage.getItem("tickets")) || [];
allTickets.push(ticket);

localStorage.setItem("tickets", JSON.stringify(allTickets));

alert("✅ Ticket Booked Successfully!");
}
</script>

</body>
</html>
