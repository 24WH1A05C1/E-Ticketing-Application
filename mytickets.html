<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h3>📄 My Tickets</h3>

<table class="table table-bordered">
<thead>
<tr>
<th>Name</th>
<th>Route</th>
<th>Date</th>
<th>Tickets</th>
<th>Class</th>
<th>Total Price</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

<script>
let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

let output = "";

tickets.forEach(t => {
output += `
<tr>
<td>${t.name}</td>
<td>${t.source} → ${t.dest}</td>
<td>${t.date}</td>
<td>${t.tickets}</td>
<td>${t.cls}</td>
<td>₹${t.total}</td>
</tr>
`;
});

document.getElementById("tableData").innerHTML = output || "<tr><td colspan='6'>No Tickets Found</td></tr>";
</script>

</body>
</html>
